[include fluidd.cfg]
[include KAMP_Settings.cfg]
[include ./KAMP/Line_Purge.cfg]
[include ./KAMP/Smart_Park.cfg]
[exclude_object]
[virtual_sdcard]
path: /home/zeroshin/printer_data/gcodes
on_error_gcode: CANCEL_PRINT
[include macros.cfg]
[force_move]
enable_force_move : True
[idle_timeout]
timeout: 2100 
# [firmware_retraction]
# retract_length: 0.15

############################################
# Stepper
############################################

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA7
position_min: -3
position_endstop: -2
position_max: 260 
homing_speed: 80.0

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC13
microsteps: 16
rotation_distance: 32
endstop_pin: !PC5
position_min: -10
position_endstop: -7
position_max: 261
homing_speed: 80.0

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC14
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop ; Virtual Probe active
position_max: 260 ; More Movement to the right old250
position_min: -5
homing_speed: 5.0

[stepper_z1]
step_pin: PC0
dir_pin: !PC1
enable_pin: !PC15
microsteps: 16
rotation_distance: 8

[thermistor NTC100K]
temperature1: 27
resistance1: 97337
temperature2: 90.5
resistance2: 7852
temperature3: 221
resistance3: 339

[extruder]
step_pin: PB4
dir_pin: PB3
enable_pin: !PA15
microsteps: 16
rotation_distance: 22.4471  #has to be calibrated by everyone
gear_ratio: 50:17
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: NTC100K
sensor_pin: PC4
#control: pid
#pid_kp: 30.818
#pid_ki: 1.787
#pid_kd: 132.903
min_temp: 0
max_temp: 260
max_extrude_cross_section: 5.0
max_extrude_only_distance: 101.0
#pressure_advance: 0.46

############################################
# FANS
############################################

[heater_fan extruder_fan]
pin: PB1

[fan]
pin: PA0

[temperature_fan Mainboard]
pin: mcu:PA14
sensor_type: temperature_mcu
max_power: 1.0
shutdown_speed: 1.0
hardware_pwm: false
kick_start_time: 0.5
off_below: 0.4
max_temp: 100
min_temp: 20
target_temp: 50
max_speed: 1.0
min_speed: 0.3
control: pid
pid_Kp: 1
pid_Ki: 1
pid_Kd: 1

############################################
# Heatbed & Mesh & Z-Tilt
############################################

[heater_bed]
heater_pin: PA4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PB0
#control: pid
#pid_kp: 69.699
#pid_ki: 1.602
#pid_kd: 757.972
min_temp: 0
max_temp: 110

[bed_mesh]
mesh_min: 3,7
mesh_max: 226, 249
probe_count: 9,9
mesh_pps: 3,3
algorithm: bicubic
speed: 150
horizontal_move_z: 7

[z_tilt]
z_positions:
    -30,135
    275,135
points:
    60,105
    260,105
speed: 140
horizontal_move_z: 7
retries: 7
retry_tolerance: 0.015

[safe_z_home]
home_xy_position: 155,155 ; Virtual Probe in the middle of the bed
z_hop: 5

#######################################
#              BL Touch               #
#######################################
[bltouch]
sensor_pin: ^PB10
control_pin: PB11
#z_offset: 0
x_offset: -33
y_offset: -12
stow_on_each_sample: false
probe_with_touch_mode: true
sample_retract_dist: 2
samples: 3
speed: 6
samples_tolerance: 0.025
samples_tolerance_retries: 3
samples_result: average

############################################
# sonstiges
############################################

[output_pin LED]
pin: mcu:PA13
pwm: False
value: 0

[filament_switch_sensor runout]
pause_on_runout: false
runout_gcode: _filament_runout
insert_gcode: _filament_insert
switch_pin: PA5

[output_pin beeper_pin]
pin: PB15
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001

[input_shaper]
shaper_freq_x: 49.0
shaper_type_x: mzv
shaper_freq_y: 44.4
shaper_type_y: mzv

############################################
# MCU & Printer
############################################

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 5500
#max_accel_to_decel: 3000
max_z_velocity: 5
max_z_accel: 50
square_corner_velocity: 20

############################################
# Input Shaper Config
############################################

[mcu RP2040]
serial: /dev/serial/by-id/usb-Klipper_rp2040_E664B49507547628-if00

[adxl345]
cs_pin: RP2040:gpio28
spi_software_sclk_pin: RP2040:gpio15
spi_software_mosi_pin: RP2040:gpio26
spi_software_miso_pin: RP2040:gpio27

[resonance_tester]
accel_chip: adxl345
probe_points:
    122.5,125,20

