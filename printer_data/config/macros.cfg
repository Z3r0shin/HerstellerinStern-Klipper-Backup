############################################################################################################################
# Filament Runout Macros
############################################################################################################################

[gcode_macro _filament_runout]
gcode:
    SET_IDLE_TIMEOUT TIMEOUT=43200 # Set idle_timeout to 3hrs
    PAUSE  # Call PAUSE first to save the current target temperature
    M104 S160 # put hotend to no drips AFTER pause saves the temp
    G91 # Relative positioning
    G1 E-10 F2100 # Retract 10mm of filament
    G1 Z10 # Move Z up 10mm from current position
    G90 # Absolute positioning
    G1 X1 Y1 F6000 # Park at the coordinates you said you wanted
    M106 S0 # Disable the part cooling fan

[gcode_macro _filament_insert]
gcode:
    # Get the extruder min_extrude_temp (will be 150 if not defined)
    {% set TARGET = printer.configfile.config.extruder.min_extrude_temp|float %}
    # Get the current extruder temp
    {% set TEMP = extruder %}
    {% if TEMP < TARGET %}
        RESPOND TYPE=error MSG="Please heat the extruder before continuing."
    {% else %}
        RESPOND TYPE=error MSG="Press RESUME to continue."
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT=900 # Set idle_timeout to 15 minutes

[gcode_macro HEAT_AND_RESUME]
description: Heat the extruder and resume print when target is reached
gcode:
    # Get the extruder min_extrude_temp (will be 150 if not defined)
    {% set min_target = printer.configfile.config.extruder.min_extrude_temp|float %}
    # Get the target from params or set it to min_target if none is given
    {% set TARGET = params.TARGET|default(210)|float %}
    # Heat the extruder and wait for the target to be reached
    M109 S{extruder}
    # Notify that print is resuming
    RESPOND TYPE=error MSG="Temperature reached. Resuming print."
    # Resume print when target is reached
    # This will automatically restore to the pre-PAUSE position
    # See here: https://www.klipper3d.org/G-Codes.html#resume
    RESUME



[gcode_macro M601]
description: Makes it pause.
gcode:
    PAUSE

[gcode_shell_command qr_spoolman_scan]
command: sh /home/<user>/printer_data/config/qr_spoolman.sh
timeout: 10.0
verbose: True

[gcode_macro SCAN_SPOOL_QR]
description: Scan spool QR code and set active spool in Spoolman
gcode:
    RESPOND MSG="Hold QR code up to camera..."
    RUN_SHELL_COMMAND CMD=qr_spoolman_scan
    RESPOND MSG="Scan complete. Check console for result."

[gcode_macro EXTRUDE_100]
description: Extrude 100mm of filament at 5mm/s
gcode:
    {% if printer.extruder.can_extrude %}
        M83                          ; relative extrusion mode
        G1 E100 F300                 ; extrude 100mm at 5mm/s (300mm/min)
        M82                          ; restore absolute extrusion mode
    {% else %}
        {action_respond_info("Extruder not hot enough to extrude. Heat it up first.")}
    {% endif %}

[gcode_macro QUERY_ACCELEROMETER]
gcode:
    ACCELEROMETER_QUERY

[gcode_macro QUERY_FILAMENT_SENSOR2]
gcode:
   QUERY_FILAMENT_SENSOR SENSOR=filament_sensor