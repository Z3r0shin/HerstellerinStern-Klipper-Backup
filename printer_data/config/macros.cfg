##################################################################################################################################################################################################################
##
## START, PAUSE, RESUME, END AND CANCEL PRINT
##
##################################################################################################################################################################################################################
######################################################################
## START PRINT
######################################################################
[gcode_macro START_PRINT]
description: All what needs to be done at print start
gcode:
    #### set defaults ####
    {% set extruder = params.EXTRUDER|default(0) %}
    {% set bed = params.BED|default(0) %}
    #### end off definition  ####
	_CG28                                      ; Conditionnal Homing
    BED_MESH_CLEAR                             ; Clearing previous Mesh
    M83                                        ; Extruder relative mode
    SET_PIN PIN=LED VALUE=1.00                 ; Light the leds up
    M104 S150                                  ; Heat up extruder to near temps to save some time
        G92 E0.0                               ; Reset extruder length
	M190 S{bed}                                ; Bed heat up
    BED_MESH_CALIBRATE                         ; Uncomment to calibrate before each print
    BED_MESH_PROFILE LOAD=default              ; Loads Default KAMP updated Mesh
	SMART_PARK                                 ; Smart parks the extruder
	M109 S{extruder}                           ; Extruder heats up to target temp
        G92 E0.0                               ; Reset extruder length
	G90                                        ; Absolute positioning
    SET_GCODE_OFFSET Z=0                       ; Clear previous Z Offset
    SET_GCODE_OFFSET Z=-0.025                  ; Apply current Z Offset
    LINE_PURGE                                 ; Purge line
#	PRIME_LINE                                 ; First move 

[pause_resume]

######################################################################
## PAUSE PRINT
######################################################################
[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
# change this if you need more or less extrusion
variable_extrude: 1.0
gcode:
    ##### read E from pause macro #####
    {% set E = printer["gcode_macro PAUSE"].extrude|float %}
    ##### set park positon for x and y #####
    # default is your max posion from your printer.cfg
    {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
    {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
    ##### calculate save lift position #####
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 2.0) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    {%set min_extrude_temp = printer.configfile.settings["extruder"]["min_extrude_temp"]|int %}
    {%set act_extrude_temp = printer.extruder.temperature|int %}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target}
    ##### end of definitions #####
    PAUSE_BASE
    G91
    {% if act_extrude_temp > min_extrude_temp %}
      G1 E-{E} F2100
    {% else %}
      {action_respond_info("Extruder not hot enough")}
    {% endif %}
    {% if "xyz" in printer.toolhead.homed_axes %}
      G1 Z{z_safe} F900
      G90
      G1 X{x_park} Y{y_park} F6000
    {% else %}
      {action_respond_info("Printer not homed")}
    {% endif %} 

######################################################################
## RESUME PRINT
######################################################################
[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
variable_etemp: 0
gcode:
    ##### read E from pause macro #####
    {% set E = printer["gcode_macro PAUSE"].extrude|float %}
    {%set min_extrude_temp = printer.configfile.settings["extruder"]["min_extrude_temp"]|int %}
    {%set act_extrude_temp = printer.extruder.temperature|int %}
    #### get VELOCITY parameter if specified ####
    {% if 'VELOCITY' in params|upper %}
      {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
    {%else %}
      {% set get_params = "" %}
    {% endif %}
    ##### end of definitions #####
    {% if etemp > 0 %}
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET={etemp|int}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={etemp|int - 4} MAXIMUM={etemp|int + 10}    
    {% elif act_extrude_temp > min_extrude_temp %}
      G91
      G1 E{E} F2100
    {% else %}
      {action_respond_info("Extruder not hot enough")}
    {% endif %}  
    RESUME_BASE {get_params}

# [gcode_macro HEAT_AND_RESUME]
# description: Heat the extruder and resume print when target is reached
# gcode:
#     # Get the extruder min_extrude_temp (will be 150 if not defined)
#     {% set min_target = printer.configfile.config.extruder.min_extrude_temp|float %}
#     # Get the target from params or set it to min_target if none is given
#     {% set TARGET = params.TARGET|default(210)|float %}
#     # Heat the extruder and wait for the target to be reached
#     M109 S{extruder}
#     # Notify that print is resuming
#     RESPOND TYPE=error MSG="Temperature reached. Resuming print."
#     # Resume print when target is reached
#     # This will automatically restore to the pre-PAUSE position
#     # See here: https://www.klipper3d.org/G-Codes.html#resume
#     RESUME

######################################################################
## END PRINT
######################################################################
[gcode_macro End_Print]
description: All what needs to be done at print end
gcode:
    TURN_OFF_HEATERS                         ; Turn off bed and nozzle
	G91                                      ; Relative positioning
	G1 E-6 F3000                             ; Retract
	G1 X-0.5 Y-0.5 Z5 E-6                    ; Move a bit and retract filament even more
	G90                                      ; Absolute positioning
	G1 X20 Y235 F2200                        ; Move bed to front
	M107                                     ; Turn off part fan
	M84                                      ; Steppers off
	G90                                      ; Absolute positioning
    SET_GCODE_OFFSET Z=0                     ; Clear the Z Offset
    SET_PIN PIN=LED VALUE=0.00               ; Close the lights
	M117 Print done                          ; Send finish to display

######################################################################
## CANCEL PRINT
######################################################################
[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
  SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}      ; set timeout back to configured value
  CLEAR_PAUSE
  SDCARD_RESET_FILE
  PRINT_END
  BASE_CANCEL_PRINT
 
##################################################################################################################################################################################################################
##
## FILAMENT MACROS
##
##################################################################################################################################################################################################################
######################################################################
## QUERY FILAMENT SENSOR
######################################################################
[gcode_macro QUERY_FILAMENT_SENSOR2]
gcode:
   QUERY_FILAMENT_SENSOR SENSOR=filament_sensor

######################################################################
## DISABLE FILAMENT SENSOR
######################################################################
[delayed_gcode DISABLE_FILAMENT_SENSOR]
initial_duration: 1
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0

######################################################################
## M600 - FILAMENT CHANGE
######################################################################
[gcode_macro M600]
description: Pause for filament change
gcode:
  PAUSE
  UNLOAD_FILAMENT

######################################################################
## LOAD FILAMENT
######################################################################
[gcode_macro LOAD_FILAMENT]
variable_load_distance:  25
variable_purge_distance:  30
gcode:
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=200
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={200-4} MAXIMUM={200+40}
  {% set speed = params.SPEED|default(300) %}
  {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 30 %}
  SAVE_GCODE_STATE NAME=load_state
  G91
  G92 E0
  G1 E{load_distance} F{max_velocity}          ; fast-load
  G1 E{purge_distance} F{speed}                ; purge
  RESTORE_GCODE_STATE NAME=load_state

######################################################################
## UNLOAD FILAMENT
######################################################################
[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  55
variable_purge_distance:  15
gcode:
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=200
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={200-4} MAXIMUM={200+40}
  {% set speed = params.SPEED|default(300) %}
  {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 30 %}
  SAVE_GCODE_STATE NAME=unload_state
  G91
  G92 E0
  G1 E{purge_distance} F{speed}                ; purge
  G1 E-{unload_distance} F{max_velocity}       ; fast-unload
  RESTORE_GCODE_STATE NAME=unload_state

######################################################################
## FILAMENT RUNOUT
######################################################################
[gcode_macro _filament_runout]
gcode:
    SET_IDLE_TIMEOUT TIMEOUT=43200 # Set idle_timeout to 3hrs
    PAUSE  # Call PAUSE first to save the current target temperature
    M104 S160 # put hotend to no drips AFTER pause saves the temp
    G91 # Relative positioning
    G1 E-10 F2100 # Retract 10mm of filament
    G1 Z10 # Move Z up 10mm from current position
    G90 # Absolute positioning
    G1 X1 Y1 F6000 # Park at the coordinates you said you wanted
    M106 S0 # Disable the part cooling fan

[gcode_macro _filament_insert]
gcode:
    # Get the extruder min_extrude_temp (will be 150 if not defined)
    {% set TARGET = printer.configfile.config.extruder.min_extrude_temp|float %}
    # Get the current extruder temp
    {% set TEMP = extruder %}
    {% if TEMP < TARGET %}
        RESPOND TYPE=error MSG="Please heat the extruder before continuing."
    {% else %}
        RESPOND TYPE=error MSG="Press RESUME to continue."
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT=900 # Set idle_timeout to 15 minutes

