[gcode_shell_command qr_spoolman_scan]
command: sh /home/<user>/printer_data/config/qr_spoolman.sh
timeout: 10.0
verbose: True

[gcode_macro SCAN_SPOOL_QR]
description: Scan spool QR code and set active spool in Spoolman
gcode:
    RESPOND MSG="Hold QR code up to camera..."
    RUN_SHELL_COMMAND CMD=qr_spoolman_scan
    RESPOND MSG="Scan complete. Check console for result."